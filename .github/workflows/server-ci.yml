name: Server CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Typecheck and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            frontend/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Server typecheck
        run: npx tsc --noEmit
        working-directory: server

      - name: Frontend typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Frontend lint
        run: npx eslint src/
        working-directory: frontend

  db-integration:
    name: DB Integration Tests
    runs-on: ubuntu-latest
    needs: quality-gates
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUN_DB_INTEGRATION_TESTS: "1"
      PROPOSAL_RPC_FALLBACK_MODE: "disabled"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Validate integration test secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing required secrets: SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run DB integration tests
        run: npm run test:integration
        working-directory: server

      - name: Run A-1 migration verification smoke
        run: npm run verify:a1-migration
        working-directory: server
